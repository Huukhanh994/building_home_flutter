name: buildhome_vn
description: BuildHome VN – Smart Home Construction Assistant
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # PDF generation & sharing
  pdf: ^3.10.8
  printing: ^5.13.0
  share_plus: ^9.0.0
  path_provider: ^2.1.3

  # Number formatting / i18n
  intl: ^0.19.0

  # Camera / image picker
  image_picker: ^1.1.2

  # State (lightweight)
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
